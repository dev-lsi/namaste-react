<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namste React</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <h1>Hello world from HTML!</h1>

    <div id="html-root"></div>

    <div id="react-root"></div>
    <div id="react-root2"></div>

    


    <script>
        const h2=document.createElement("h2");
        h2.innerHTML="Hello world from JavaScript!";
        const root=document.getElementById('html-root');
        root.appendChild(h2);
    </script>

    <script 
        crossorigin src="https://unpkg.com/react@18/umd/react.development.js">
    </script>
    <script 
        crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js">
    </script>

    <script src="./app.js"></script>

</body>

</html>
